name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Pruebas y Calidad de Código
  # ──────────────────────────────────────────────
  test:
    name: "🧪 Tests & Linting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pip install poetry

      - name: Instalar dependencias
        run: poetry install --no-interaction

      - name: Entrenar modelo para tests
        run: poetry run python train.py

      - name: Ejecutar tests
        run: poetry run pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # JOB 2: Deploy GitHub Pages (presentaciones)
  # ──────────────────────────────────────────────
  deploy-pages:
    name: "🌐 Deploy Presentaciones"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefactos de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
